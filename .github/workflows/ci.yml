name: CI

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx vite build
        working-directory: packages/client
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist
      - id: deployment
        uses: actions/deploy-pages@v4

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - id: canary-version
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="0.0.1-canary.$SHORT_SHA"
          else
            BASE="${LATEST_TAG#v}"
            IFS='.' read -r major minor patch <<< "$BASE"
            VERSION="$major.$minor.$((patch + 1))-canary.$SHORT_SHA"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/fungus/server:sha-${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/fungus/server:${{ steps.canary-version.outputs.version }}

  canary-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: bump
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="0.0.1-canary.$SHORT_SHA"
          else
            BASE="${LATEST_TAG#v}"
            IFS='.' read -r major minor patch <<< "$BASE"
            VERSION="$major.$minor.$((patch + 1))-canary.$SHORT_SHA"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          prerelease: true
